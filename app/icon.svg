<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1f24" />
      <stop offset="100%" stop-color="#0d0d10" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e2e9" />
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Container -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)"/>
  
  <!-- Glowing subtle inner ring -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="6" stroke-dasharray="12 18" opacity="0.12"/>
  
  <!-- Centered POS & Cloche Logo group -->
  <g transform="translate(128, 128)" fill="url(#accent-grad)">
    <!-- Food Dome Cloche -->
    <path d="M128 32 C128 14.3 113.7 0 96 0 C78.3 0 64 14.3 64 32 C64 33.8 64.1 35.5 64.4 37.2 C27.2 49.3 0 84.4 0 126 C0 127.1 0.1 128 0.2 128 L191.8 128 C191.9 128 192 127.1 192 126 C192 84.4 164.8 49.3 127.6 37.2 C127.9 35.5 128 33.8 128 32 Z" transform="translate(32, 36)"/>
    
    <!-- Base Plate / Tray -->
    <rect x="16" y="172" width="224" height="14" rx="7"/>
    
    <!-- Stylized Receipt / Checkout Slot -->
    <path d="M64 200 L64 228 C64 232.4 67.6 236 72 236 L184 236 C188.4 236 192 232.4 192 228 L192 200 Z" opacity="0.9"/>
    
    <!-- Cutout Line in checkout card -->
